<!DOCTYPE html>
<html>
<head>
  <title>Internet Mood Analyzer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🌐 Internet Mood Analyzer</h1>

  <input type="text" id="topic" placeholder="Enter a topic">
  <button onclick="analyzeMood()">Analyze</button>

<div id="result"></div>

<div class="bar-container">
  <div id="positiveBar" class="bar positive"></div>
  <div id="negativeBar" class="bar negative"></div>
  <div id="neutralBar" class="bar neutral"></div>
</div>
